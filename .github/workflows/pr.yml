name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: 10.0.x
      - run: dotnet test TeleDisk.slnx -c Release --nologo
      - run: dotnet run --project src/TeleDisk.Benchmarks/TeleDisk.Benchmarks.csproj -c Release --nologo
