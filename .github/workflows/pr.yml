name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet test TeleDisk.slnx -c Release --nologo
      - run: dotnet run --project src/TeleDisk.Benchmarks/TeleDisk.Benchmarks.csproj -c Release --nologo
