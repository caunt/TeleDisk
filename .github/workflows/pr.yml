name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet test TeleDisk.slnx -c Release --nologo
      - run: dotnet run --project src/TeleDisk.Benchmarks/TeleDisk.Benchmarks.csproj -c Release --nologo
